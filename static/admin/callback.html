<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>VISTA CMS — 授权中...</title></head>
<body>
  <p id="status">正在完成 GitHub 授权...</p>
  <script>
    (function() {
      var code = new URLSearchParams(window.location.search).get('code');
      if (!code) {
        document.getElementById('status').textContent = '授权失败：缺少 code 参数';
        return;
      }

      // 调 Worker API 用 code 换 token
      fetch('https://vista-cms-oauth.boil99.workers.dev/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          document.getElementById('status').textContent = '授权失败：' + JSON.stringify(data.error);
          return;
        }
        // 同源 postMessage，CMS 不会被跨域限制拦截
        window.opener.postMessage({ token: data.token, provider: 'github' }, window.location.origin);
        document.getElementById('status').textContent = '授权成功，窗口即将关闭...';
        setTimeout(function() { window.close(); }, 500);
      })
      .catch(function(err) {
        document.getElementById('status').textContent = '网络错误：' + err.message;
      });
    })();
  </script>
</body>
</html>
