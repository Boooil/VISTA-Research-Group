<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>VISTA CMS — 授权中...</title></head>
<body>
  <p id="status">正在完成 GitHub 授权...</p>
  <script>
    (function() {
      var code = new URLSearchParams(window.location.search).get('code');
      if (!code) {
        document.getElementById('status').textContent = '授权失败：缺少 code 参数';
        return;
      }

      fetch('https://vista-cms-oauth.boil99.workers.dev/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          document.getElementById('status').textContent = '错误：' + JSON.stringify(data.error);
          return;
        }

        // 策略1: postMessage（同源，CMS 可能监听）
        try { window.opener.postMessage({ token: data.token, provider: 'github' }, '*'); } catch(e) {}

        // 策略2: 将 token 写入 opener 的 localStorage
        try { window.opener.localStorage.setItem('decap-cms-github-token', data.token); } catch(e) {}

        // 策略3: 重定向 opener 到 CMS admin 页面，token 放 hash
        try {
          window.opener.location.href = 'https://vista-research-group.pages.dev/admin/#access_token=' + data.token + '&provider=github';
        } catch(e) {}

        // 如果所有策略都失败（如 opener 为 null），在当前窗口打开 admin
        if (!window.opener) {
          window.location.href = 'https://vista-research-group.pages.dev/admin/';
        }

        document.getElementById('status').textContent = '授权成功，窗口即将关闭...';
        setTimeout(function() { window.close(); }, 1000);
      })
      .catch(function(err) {
        document.getElementById('status').textContent = '网络错误：' + err.message;
      });
    })();
  </script>
</body>
</html>
