# =============================================================================
# Decap CMS Configuration — VISTA Research Group
# Phase 1: Backend + Media setup (collections to be added in Phase 2)
# =============================================================================

# --- Backend (Netlify Git Gateway) ---
backend:
  name: git-gateway
  branch: main
  repo: Boooil/VISTA-Research-Group

# --- Media & Uploads ---
# 上传的图片存入 static/uploads/，Hugo 构建后映射为 /uploads/
media_folder: "static/uploads"
public_folder: "/uploads"

# --- Localization (中文化) ---
locale: "zh_Hans"

# --- Site URL (用于预览链接) ---
site_url: "https://vista-research-group.netlify.app/"
display_url: "https://vista-research-group.netlify.app/"

# --- Slug 配置 ---
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# --- Collections (Phase 2 将在此处添加) ---
# collections: []
