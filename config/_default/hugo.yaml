# =============================================================================
# Hugo Configuration — VISTA Research Group
# =============================================================================
baseURL: "https://boooil.github.io/VISTA-Research-Group/"
title: "VISTA Research Group"
enableGitInfo: false
enableRobotsTXT: true
pagination:
  pagerSize: 10
timeout: "120s"

# Build options
build:
  writeStats: true

# Taxonomies
taxonomies:
  author: authors
  category: categories
  tag: tags
  publication_type: publication_types

# Permalinks
permalinks:
  post: "/post/:slug/"
  project: "/project/:slug/"
  publication: "/publication/:slug/"
  authors: "/author/:slug/"

# Module configuration — HugoBlox via Hugo Modules
module:
  hugoVersion:
    extended: true
    min: "0.148.2"
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
            - - $
              - $
  highlight:
    style: "dracula"
  tableOfContents:
    endLevel: 3
    startLevel: 2

# Sitemap
sitemap:
  changefreq: weekly
  priority: 0.5

# Related content
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70

# Image processing quality
imaging:
  quality: 90
  resampleFilter: "Lanczos"

# Cascade front matter for sections
cascade:
  - target:
      path: "/publication"
    view: citation
  - target:
      path: "/post"
    view: date-title-summary
    columns: "2"
  - target:
      path: "/project"
    type: widget_page
    view: card
    columns: "2"

# Minification
minify:
  tdewolff:
    html:
      keepWhitespace: false
