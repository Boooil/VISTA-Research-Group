# =============================================================================
# Netlify Configuration — VISTA Research Group
# =============================================================================
[build]
  command = "hugo --minify --gc --cleanDestinationDir --baseURL https://vista-research-group.netlify.app/ && npx pagefind --site public --force-language zh"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.148.2"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
  GO_VERSION = "1.22"

[context.production]
  command = "hugo --minify --gc --cleanDestinationDir --enableGitInfo --baseURL https://vista-research-group.netlify.app/ && npx pagefind --site public --force-language zh"

[context.deploy-preview]
  command = "hugo --minify --cleanDestinationDir --buildFuture --buildDrafts --baseURL https://vista-research-group.netlify.app/ && npx pagefind --site public --force-language zh"

[context.branch-deploy]
  command = "hugo --minify --cleanDestinationDir --buildFuture --buildDrafts --baseURL https://vista-research-group.netlify.app/ && npx pagefind --site public --force-language zh"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
