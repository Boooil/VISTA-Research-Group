# =============================================================================
# GitHub Actions — Deploy VISTA Website to GitHub Pages
# =============================================================================
name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.148.2"
      GO_VERSION: "1.22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js Dependencies
        run: |
          pnpm install
          echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      - name: Cache Hugo Modules
        uses: actions/cache@v4
        with:
          path: |
            /tmp/hugo_cache
            /home/runner/go/pkg/mod
          key: ${{ runner.os }}-hugo-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Download Hugo Modules
        run: hugo mod get

      - name: Build
        run: |
          hugo --minify --gc --cleanDestinationDir --enableGitInfo \
            --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Index with Pagefind
        run: npx pagefind --site public --force-language zh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
